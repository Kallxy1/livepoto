name: Android CI (Build APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5

      - name: Recreate missing Gradle wrapper files
        run: |
          mkdir -p gradle/wrapper

          # Buat gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Generate gradle-wrapper.jar dan gradlew
          gradle wrapper --gradle-version 7.5 --no-daemon

          chmod +x gradlew

      - name: Recreate missing build.gradle (root) if needed
        run: |
          if [ ! -f build.gradle ]; then
            echo "Root build.gradle missing. Creating..."
            cat > build.gradle <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          fi

      - name: Recreate settings.gradle if needed
        run: |
          if [ ! -f settings.gradle ]; then
            echo "settings.gradle missing. Creating..."
            cat > settings.gradle <<'EOF'
          rootProject.name = "LivePhotoConverter"
          include ':app'
          EOF
          fi

      - name: Commit restored files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            gradlew \
            gradlew.bat \
            gradle/wrapper/gradle-wrapper.jar \
            gradle/wrapper/gradle-wrapper.properties \
            build.gradle \
            settings.gradle

          if ! git diff --cached --quiet; then
            git commit -m "Restore missing Gradle wrapper and config files [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LivePhotoConverter-Debug
          path: app/build/outputs/apk/debug/*.apk
