name: Android CI (Build APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Regenerate Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found. Regenerating..."

            GRADLE_DIST=$(grep '^distributionUrl=' gradle/wrapper/gradle-wrapper.properties | cut -d= -f2- | sed 's/\\:/:/g')
            if [ -z "$GRADLE_DIST" ]; then
              echo "distributionUrl not found in gradle-wrapper.properties"
              exit 1
            fi

            curl -L "$GRADLE_DIST" -o gradle.zip
            unzip -q gradle.zip

            GRADLE_DIR=$(zipinfo -1 gradle.zip | head -1 | cut -d/ -f1)
            "./$GRADLE_DIR/bin/gradle" wrapper --no-daemon
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LivePhotoConverter-Debug
          path: app/build/outputs/apk/debug/*.apk
